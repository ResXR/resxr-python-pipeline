name: resxr_env
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python (matches pyproject.toml requires-python >=3.10)
  - python>=3.10

  # Required runtime dependencies
  - pandas>=2.0
  - numpy>=1.24
  - pyyaml>=6.0
  - pydantic>=2.0
  - plotly>=5.0
  - jinja2>=3.0
  
  - pip
  - pip:
    - .
