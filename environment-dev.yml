name: resxr_dev
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python (matches pyproject.toml requires-python >=3.10)
  - python>=3.10

  # Required runtime dependencies
  - pandas>=2.0
  - numpy>=1.24
  - pyyaml>=6.0
  - pydantic>=2.0
  - plotly>=5.0
  - jinja2>=3.0
  
  # Development tools
  - pytest=9.0.*
  - ruff=0.14.*
  
  # Optional: Useful dev tools (uncomment if needed)
  # - ipython          # Better REPL
  # - jupyter          # Notebooks for exploration
  # - pre-commit       # Git hooks for code quality
  
  - pip
  - pip:
    - -e ".[dev]"
